name: mp3tuneup-backend
serviceType: web
region: oregon
plan: free
buildCommand: chmod +x start.sh && npm install && npm run build
startCommand: bash start.sh
healthCheckPath: /health
envVars:
  - key: NODE_ENV
    value: production
  - key: PORT
    value: 4000
  - key: MAX_DURATION_SECONDS
    value: 1800
  - key: PROCESS_TIMEOUT_MS
    value: 300000
  - key: ALLOWED_ORIGINS
    value: https://mp3tuneup-frontend.onrender.com